<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Block Builder</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0e1116; color: #e6edf3;
    font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; overflow: hidden; }
  #ui {
    position: fixed; top: 12px; left: 12px; z-index: 2;
    background: rgba(22,27,34,0.85); border: 1px solid #30363d; border-radius: 8px;
    padding: 10px 12px; backdrop-filter: blur(6px); max-width: 300px;
  }
  #ui h1 { font-size: 14px; margin: 0 0 6px; font-weight: 600; }
  #ui p { margin: 4px 0; color: #9da7b3; font-size: 12px; }
  #palette { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .sw { width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .sw.active { border-color: #ffffff; }
  #actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  button { background: #21262d; color: #e6edf3; border: 1px solid #30363d;
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font: inherit; }
  button:hover { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.primary:hover { background: #2ea043; }
  #hint { position: fixed; bottom: 12px; left: 12px; z-index: 2;
    color: #6e7681; font-size: 12px; }
  #hud {
    position: fixed; top: 12px; right: 12px; z-index: 2;
    background: rgba(22,27,34,0.85); border: 1px solid #30363d; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; display: none;
  }
  #hud .label { color: #9da7b3; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  #hud .val { font-size: 18px; font-weight: 600; }
  #gameover {
    position: fixed; inset: 0; z-index: 3; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
  }
  #gameover .box {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px 28px; text-align: center; min-width: 240px;
  }
  #gameover h2 { margin: 0 0 8px; font-size: 20px; }
  #gameover p { margin: 0 0 16px; color: #9da7b3; }
  canvas { display: block; cursor: crosshair; }
  body.play canvas { cursor: default; }
</style>
</head>
<body>

<div id="ui">
  <h1>Block Builder</h1>
  <p id="modeHelp">Left-click: place. Right-click: remove. Drag: pan. Wheel: zoom. 1–7: color. R: rotate.</p>
  <div id="palette"></div>
  <div id="actions">
    <button id="playBtn" class="primary">Play</button>
    <button id="clear">Clear</button>
    <button id="save">Save PNG</button>
    <button id="muteBtn" title="Toggle sound">Sound: on</button>
  </div>
</div>

<div id="hud">
  <div class="label">Survived</div>
  <div class="val"><span id="score">0</span>s</div>
</div>

<div id="gameover">
  <div class="box">
    <h2 id="goTitle">Game Over</h2>
    <p id="goSub">A block landed on you.</p>
    <button id="goAgain" class="primary">Play again</button>
    <button id="goBuild">Back to build</button>
  </div>
</div>

<div id="hint">A small collective coding experiment.</div>

<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = window.devicePixelRatio || 1;

  const TILE = 48;
  const HEIGHT = 28;
  const GRID = 12;
  let zoom = 1;
  let camX = 0, camY = 0;
  let rot = 0;

  const COLORS = ['#f87171','#fbbf24','#34d399','#60a5fa','#a78bfa','#f472b6','#e5e7eb'];
  let active = 2;

  const blocks = new Map();
  const key = (x,y,z) => `${x},${y},${z}`;
  const heightAt = (x,y) => {
    let h = 0;
    while (blocks.has(key(x,y,h))) h++;
    return h;
  };
  const inBounds = (x,y) => x >= -GRID && x <= GRID && y >= -GRID && y <= GRID;

  function buildGround() {
    blocks.clear();
    for (let x = -GRID; x <= GRID; x++)
      for (let y = -GRID; y <= GRID; y++)
        blocks.set(key(x,y,-1), 6);
  }
  buildGround();

  function rotated(x, y) {
    switch (((rot % 4) + 4) % 4) {
      case 0: return [x, y];
      case 1: return [-y, x];
      case 2: return [-x, -y];
      case 3: return [y, -x];
    }
  }

  function worldToScreen(x, y, z) {
    const [rx, ry] = rotated(x, y);
    const sx = (rx - ry) * (TILE/2) * zoom + camX + W/2;
    const sy = (rx + ry) * (TILE/4) * zoom - z * HEIGHT * zoom + camY + H/2;
    return [sx, sy];
  }

  function shade(hex, k) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const f = (v) => Math.max(0, Math.min(255, Math.round(v * k)));
    return `rgb(${f(r)},${f(g)},${f(b)})`;
  }

  function drawBlock(x, y, z, ci) {
    const color = COLORS[ci];
    const [tx, ty] = worldToScreen(x, y, z + 1);
    const w = (TILE/2) * zoom, h = (TILE/4) * zoom, vh = HEIGHT * zoom;

    ctx.fillStyle = shade(color, 1.0);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + w, ty + h);
    ctx.lineTo(tx, ty + 2*h);
    ctx.lineTo(tx - w, ty + h);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = shade(color, 0.7);
    ctx.beginPath();
    ctx.moveTo(tx - w, ty + h);
    ctx.lineTo(tx, ty + 2*h);
    ctx.lineTo(tx, ty + 2*h + vh);
    ctx.lineTo(tx - w, ty + h + vh);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = shade(color, 0.55);
    ctx.beginPath();
    ctx.moveTo(tx + w, ty + h);
    ctx.lineTo(tx, ty + 2*h);
    ctx.lineTo(tx, ty + 2*h + vh);
    ctx.lineTo(tx + w, ty + h + vh);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx, ty); ctx.lineTo(tx + w, ty + h);
    ctx.lineTo(tx, ty + 2*h); ctx.lineTo(tx - w, ty + h); ctx.closePath();
    ctx.moveTo(tx, ty + 2*h); ctx.lineTo(tx, ty + 2*h + vh);
    ctx.stroke();
  }

  // -------- Audio (Web Audio synth, no asset files) --------
  let ac = null, masterGain = null, audioOn = true;
  function ensureAudio() {
    if (ac) return;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ac.createGain();
      masterGain.gain.value = 0.25;
      masterGain.connect(ac.destination);
    } catch { ac = null; }
  }
  function envOsc({ type = 'sine', freq = 440, freqEnd = null, dur = 0.1, vol = 0.5, attack = 0.005, release = 0.08 }) {
    if (!audioOn || !ac) return;
    const t0 = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + release);
    osc.connect(g).connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + release + 0.02);
  }
  function envNoise({ dur = 0.1, vol = 0.4, lowpass = 2000, release = 0.06 }) {
    if (!audioOn || !ac) return;
    const t0 = ac.currentTime;
    const len = Math.max(1, Math.floor(ac.sampleRate * (dur + release)));
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = lowpass;
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + release);
    src.connect(lp).connect(g).connect(masterGain);
    src.start(t0); src.stop(t0 + dur + release + 0.02);
  }
  const sfx = {
    place:  () => { envOsc({ type: 'square', freq: 520, freqEnd: 380, dur: 0.06, vol: 0.18 }); },
    remove: () => { envOsc({ type: 'square', freq: 240, freqEnd: 160, dur: 0.07, vol: 0.16 }); },
    step:   () => { envOsc({ type: 'sine',   freq: 180, freqEnd: 110, dur: 0.05, vol: 0.22 });
                    envNoise({ dur: 0.04, vol: 0.08, lowpass: 1200 }); },
    land:   () => { envOsc({ type: 'sine',   freq: 120, freqEnd: 60,  dur: 0.12, vol: 0.35 });
                    envNoise({ dur: 0.08, vol: 0.18, lowpass: 800 }); },
    growl:  () => { envOsc({ type: 'sawtooth', freq: 90, freqEnd: 55, dur: 0.45, vol: 0.18 });
                    envOsc({ type: 'sawtooth', freq: 65, freqEnd: 40, dur: 0.5, vol: 0.12 }); },
    over:   () => { envOsc({ type: 'triangle', freq: 440, freqEnd: 110, dur: 0.5, vol: 0.3, release: 0.2 });
                    envOsc({ type: 'square',  freq: 220, freqEnd:  55, dur: 0.6, vol: 0.18, release: 0.25 }); },
    start:  () => { envOsc({ type: 'square', freq: 392, dur: 0.08, vol: 0.18 });
                    setTimeout(() => envOsc({ type: 'square', freq: 587, dur: 0.12, vol: 0.2 }), 70); },
  };

  // -------- Entities --------
  // Player: smooth-interpolated grid position. Falls off blocks if there's nothing under it.
  const player = { x: 0, y: 0, vx: 0, vy: 0, targetX: 0, targetY: 0, moving: false, alive: true };
  // Monster: chases player on a slower schedule
  const monster = { x: 6, y: 6, vx: 6, vy: 6, targetX: 6, targetY: 6, moving: false, stepCooldown: 0 };

  // Falling blocks in mid-air: {x,y,z,ci}
  const falling = [];

  // -------- Game mode --------
  let mode = 'build';            // 'build' | 'play'
  let gameStart = 0;
  let lastBlockSpawn = 0;
  let spawnInterval = 900;       // ms
  let lastT = 0;
  let running = true;

  function drawLandingShadow(x, y, landZ, currentZ) {
    // intensify as the falling block approaches landing
    const dz = Math.max(0, currentZ - landZ);
    const t = Math.max(0, Math.min(1, 1 - dz / 8));
    const [sx, sy] = worldToScreen(x, y, landZ + 1);
    const w = (TILE/2) * zoom, h = (TILE/4) * zoom;
    ctx.save();
    ctx.fillStyle = `rgba(248, 113, 113, ${0.18 + 0.45 * t})`;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + w, sy + h);
    ctx.lineTo(sx, sy + 2*h);
    ctx.lineTo(sx - w, sy + h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = `rgba(255, 80, 80, ${0.3 + 0.5 * t})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawSprite(x, y, z, color, kind) {
    // x,y can be fractional for smoothness
    const [sx, sy] = worldToScreen(x, y, z);
    const w = TILE * 0.35 * zoom;
    const hgt = HEIGHT * 1.2 * zoom;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, w * 0.9, w * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // body
    if (kind === 'player') {
      ctx.fillStyle = shade(color, 0.85);
      ctx.fillRect(sx - w*0.5, sy - hgt, w, hgt);
      ctx.fillStyle = color;
      ctx.fillRect(sx - w*0.5, sy - hgt, w, hgt*0.55);
      // eyes
      ctx.fillStyle = '#0e1116';
      ctx.fillRect(sx - w*0.25, sy - hgt*0.75, w*0.18, w*0.18);
      ctx.fillRect(sx + w*0.07, sy - hgt*0.75, w*0.18, w*0.18);
    } else {
      // monster: jagged, two eyes
      ctx.fillStyle = shade(color, 0.85);
      const bx = sx - w*0.6, by = sy - hgt, bw = w*1.2, bh = hgt;
      ctx.beginPath();
      ctx.moveTo(bx, by + bh*0.2);
      ctx.lineTo(bx + bw*0.15, by);
      ctx.lineTo(bx + bw*0.35, by + bh*0.15);
      ctx.lineTo(bx + bw*0.55, by);
      ctx.lineTo(bx + bw*0.75, by + bh*0.15);
      ctx.lineTo(bx + bw, by + bh*0.2);
      ctx.lineTo(bx + bw, by + bh);
      ctx.lineTo(bx, by + bh);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(bx + bw*0.2, by + bh*0.35, bw*0.18, bh*0.2);
      ctx.fillRect(bx + bw*0.62, by + bh*0.35, bw*0.18, bh*0.2);
      ctx.fillStyle = '#0e1116';
      ctx.fillRect(bx + bw*0.25, by + bh*0.4, bw*0.08, bh*0.12);
      ctx.fillRect(bx + bw*0.67, by + bh*0.4, bw*0.08, bh*0.12);
    }
  }

  function draw() {
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    // collect renderables with sort key in rotated screen space
    const items = [];
    for (const [k, ci] of blocks) {
      const [x,y,z] = k.split(',').map(Number);
      const [rx, ry] = rotated(x, y);
      items.push({ kind: 'block', depth: rx + ry + z * 0.001, z, draw: () => drawBlock(x,y,z,ci) });
    }
    if (mode === 'play') {
      const pz = heightAt(Math.round(player.x), Math.round(player.y));
      const [prx, pry] = rotated(player.x, player.y);
      items.push({ kind: 'player', depth: prx + pry + 0.5, z: pz,
        draw: () => drawSprite(player.x, player.y, pz, '#60a5fa', 'player') });

      const mz = heightAt(Math.round(monster.x), Math.round(monster.y));
      const [mrx, mry] = rotated(monster.x, monster.y);
      items.push({ kind: 'monster', depth: mrx + mry + 0.5, z: mz,
        draw: () => drawSprite(monster.x, monster.y, mz, '#a855f7', 'monster') });

      for (const f of falling) {
        const [frx, fry] = rotated(f.x, f.y);
        const landZ = heightAt(f.x, f.y);
        // landing-shadow indicator on top of the stack — so the player can dodge
        items.push({ kind: 'shadow', depth: frx + fry + landZ * 0.001 - 0.5, z: landZ,
          draw: () => drawLandingShadow(f.x, f.y, landZ, f.z) });
        items.push({ kind: 'fall', depth: frx + fry + f.z * 0.001 + 0.5,
          draw: () => drawBlock(f.x, f.y, f.z, f.ci) });
      }
    }
    items.sort((a,b) => a.depth - b.depth || (a.z||0) - (b.z||0));
    for (const it of items) it.draw();
  }

  function pick(mx, my) {
    for (let z = 12; z >= 0; z--) {
      for (let x = -GRID; x <= GRID; x++) {
        for (let y = -GRID; y <= GRID; y++) {
          if (!blocks.has(key(x,y,z))) continue;
          const [sx, sy] = worldToScreen(x, y, z + 1);
          const w = (TILE/2) * zoom, h = (TILE/4) * zoom;
          const dx = mx - sx, dy = my - sy - h;
          if (Math.abs(dx) / w + Math.abs(dy) / h <= 1) {
            return { x, y, z };
          }
        }
      }
    }
    return null;
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    draw();
  }
  window.addEventListener('resize', resize);

  // -------- Build input --------
  let dragging = false, dragMoved = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', (e) => {
    if (mode !== 'build') return;
    dragging = true; dragMoved = false; lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mouseup', (e) => {
    if (!dragging || mode !== 'build') { dragging = false; return; }
    dragging = false;
    if (dragMoved) return;
    const hit = pick(e.clientX, e.clientY);
    if (!hit) return;
    ensureAudio();
    if (e.button === 2) {
      if (hit.z >= 0) { blocks.delete(key(hit.x, hit.y, hit.z)); sfx.remove(); }
    } else {
      blocks.set(key(hit.x, hit.y, hit.z + 1), active); sfx.place();
    }
    draw();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging || mode !== 'build') return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    if (Math.abs(dx) + Math.abs(dy) > 3) dragMoved = true;
    camX += dx; camY += dy;
    lastX = e.clientX; lastY = e.clientY;
    draw();
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.001);
    zoom = Math.max(0.4, Math.min(3, zoom * factor));
    draw();
  }, { passive: false });

  // -------- Keyboard --------
  // Arrow direction is in *rotated* (screen) space, so it always matches what the player sees.
  function screenDirToWorld(dxs, dys) {
    // inverse of rotated() for direction vector
    const r = ((rot % 4) + 4) % 4;
    switch (r) {
      case 0: return [dxs, dys];
      case 1: return [dys, -dxs];
      case 2: return [-dxs, -dys];
      case 3: return [-dys, dxs];
    }
  }
  function tryStepPlayer(dxs, dys) {
    if (player.moving || !player.alive || mode !== 'play') return;
    const [dx, dy] = screenDirToWorld(dxs, dys);
    const nx = Math.round(player.x) + dx, ny = Math.round(player.y) + dy;
    if (!inBounds(nx, ny)) return;
    player.targetX = nx; player.targetY = ny; player.moving = true;
    sfx.step();
  }
  window.addEventListener('keydown', (e) => {
    if (mode === 'build') {
      if (e.key >= '1' && e.key <= '7') { active = parseInt(e.key, 10) - 1; renderPalette(); }
      else if (e.key === 'r' || e.key === 'R') { rot = (rot + 1) % 4; draw(); }
      return;
    }
    if (e.key === 'ArrowUp')    { e.preventDefault(); tryStepPlayer(0, -1); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); tryStepPlayer(0,  1); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); tryStepPlayer(-1, 0); }
    if (e.key === 'ArrowRight') { e.preventDefault(); tryStepPlayer( 1, 0); }
  });

  // -------- Palette --------
  const palette = document.getElementById('palette');
  function renderPalette() {
    palette.innerHTML = '';
    COLORS.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'sw' + (i === active ? ' active' : '');
      el.style.background = c;
      el.onclick = () => { active = i; renderPalette(); };
      palette.appendChild(el);
    });
  }
  renderPalette();

  // -------- Buttons --------
  const playBtn = document.getElementById('playBtn');
  const modeHelp = document.getElementById('modeHelp');
  const hud = document.getElementById('hud');
  const scoreEl = document.getElementById('score');
  const gameover = document.getElementById('gameover');
  const goTitle = document.getElementById('goTitle');
  const goSub = document.getElementById('goSub');

  function enterPlay() {
    ensureAudio();
    if (ac && ac.state === 'suspended') ac.resume();
    mode = 'play';
    document.body.classList.add('play');
    playBtn.textContent = 'Stop';
    modeHelp.textContent = 'Arrow keys: move. Dodge falling blocks. The monster wants you.';
    hud.style.display = 'block';
    gameover.style.display = 'none';
    sfx.start();

    player.x = 0; player.y = 0; player.targetX = 0; player.targetY = 0;
    player.moving = false; player.alive = true;
    monster.x = 8; monster.y = 8; monster.targetX = 8; monster.targetY = 8;
    monster.moving = false; monster.stepCooldown = 0;
    falling.length = 0;
    gameStart = performance.now();
    lastBlockSpawn = gameStart;
  }
  function enterBuild() {
    mode = 'build';
    document.body.classList.remove('play');
    playBtn.textContent = 'Play';
    modeHelp.textContent = 'Left-click: place. Right-click: remove. Drag: pan. Wheel: zoom. 1–7: color. R: rotate.';
    hud.style.display = 'none';
    gameover.style.display = 'none';
  }
  playBtn.onclick = () => { mode === 'build' ? enterPlay() : enterBuild(); };
  document.getElementById('clear').onclick = () => { buildGround(); draw(); };
  document.getElementById('save').onclick = () => {
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url; a.download = 'block-builder.png'; a.click();
  };
  document.getElementById('goAgain').onclick = enterPlay;
  document.getElementById('goBuild').onclick = enterBuild;
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.onclick = () => {
    audioOn = !audioOn;
    muteBtn.textContent = `Sound: ${audioOn ? 'on' : 'off'}`;
    if (audioOn) ensureAudio();
  };

  function endGame(reason) {
    player.alive = false;
    goTitle.textContent = 'Game Over';
    goSub.textContent = reason;
    const seconds = Math.floor((performance.now() - gameStart) / 1000);
    goSub.textContent = `${reason} You survived ${seconds}s.`;
    gameover.style.display = 'flex';
    sfx.over();
  }

  // -------- Update loop --------
  function spawnFalling(now) {
    // Spawn one block at a random in-bounds column above the current stack.
    const x = Math.floor(Math.random() * (GRID * 2 + 1)) - GRID;
    const y = Math.floor(Math.random() * (GRID * 2 + 1)) - GRID;
    const ci = Math.floor(Math.random() * (COLORS.length - 1)); // skip white/ground color
    falling.push({ x, y, z: 12, ci });
  }

  function stepMonster() {
    if (!player.alive) return;
    if (monster.moving) return;
    const dx = Math.sign(Math.round(player.x) - Math.round(monster.x));
    const dy = Math.sign(Math.round(player.y) - Math.round(monster.y));
    // alternate axis to avoid only moving one way
    let nx = Math.round(monster.x), ny = Math.round(monster.y);
    if (Math.abs(player.x - monster.x) > Math.abs(player.y - monster.y)) {
      nx += dx;
      if (!inBounds(nx, ny) || (nx === Math.round(monster.x) && dy)) { nx = Math.round(monster.x); ny += dy; }
    } else {
      ny += dy;
      if (!inBounds(nx, ny) || (ny === Math.round(monster.y) && dx)) { ny = Math.round(monster.y); nx += dx; }
    }
    if (!inBounds(nx, ny)) return;
    monster.targetX = nx; monster.targetY = ny; monster.moving = true;
  }

  function update(dt, now) {
    if (mode !== 'play' || !player.alive) return;

    // Player movement
    const pspeed = 6; // tiles/sec
    if (player.moving) {
      const dx = player.targetX - player.x, dy = player.targetY - player.y;
      const dist = Math.hypot(dx, dy);
      const step = pspeed * dt;
      if (dist <= step) { player.x = player.targetX; player.y = player.targetY; player.moving = false; }
      else { player.x += dx / dist * step; player.y += dy / dist * step; }
    }

    // Monster movement and step pacing
    const mspeed = 2.8;
    if (monster.moving) {
      const dx = monster.targetX - monster.x, dy = monster.targetY - monster.y;
      const dist = Math.hypot(dx, dy);
      const step = mspeed * dt;
      if (dist <= step) { monster.x = monster.targetX; monster.y = monster.targetY; monster.moving = false; monster.stepCooldown = 0.15; }
      else { monster.x += dx / dist * step; monster.y += dy / dist * step; }
    } else {
      monster.stepCooldown -= dt;
      if (monster.stepCooldown <= 0) stepMonster();
    }

    // Catch check
    if (Math.hypot(monster.x - player.x, monster.y - player.y) < 0.45) {
      sfx.growl();
      return endGame('The monster caught you.');
    }
    // Occasional growl when close
    if (Math.hypot(monster.x - player.x, monster.y - player.y) < 3.2) {
      if (!monster.lastGrowl || now - monster.lastGrowl > 1800) {
        monster.lastGrowl = now;
        sfx.growl();
      }
    }

    // Spawn falling blocks; gentle difficulty ramp keeps it dodgeable
    const elapsed = (now - gameStart) / 1000;
    const interval = Math.max(320, spawnInterval - elapsed * 12);
    while (now - lastBlockSpawn > interval) {
      spawnFalling(now);
      lastBlockSpawn += interval;
    }

    // Falling blocks descend (slower so the warning shadow is useful)
    const fallSpeed = 3.2 + elapsed * 0.08; // z units / sec
    for (let i = falling.length - 1; i >= 0; i--) {
      const f = falling[i];
      f.z -= fallSpeed * dt;
      const landZ = heightAt(f.x, f.y);
      if (f.z <= landZ) {
        const px = Math.round(player.x), py = Math.round(player.y);
        if (f.x === px && f.y === py) {
          falling.splice(i, 1);
          sfx.land();
          return endGame('A block landed on you.');
        }
        blocks.set(key(f.x, f.y, landZ), f.ci);
        falling.splice(i, 1);
        sfx.land();
      }
    }

    scoreEl.textContent = Math.floor(elapsed).toString();
  }

  function tick(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    update(dt, t);
    draw();
    requestAnimationFrame(tick);
  }

  resize();
  requestAnimationFrame(tick);
})();
</script>
</body>
